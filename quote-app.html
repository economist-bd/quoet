<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>উক্তি সংগ্রহ — কপি ও শেয়ার করুন</title>
<meta name="description" content="বাংলা উক্তি, ক্যাপশন ও স্ট্যাটাস সংগ্রহ — ক্যাটাগরি অনুযায়ী সাজানো, এক ট্যাপে কপি ও শেয়ার করুন।">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14111F;
    --bg-soft: #191527;
    --card: #1E1830;
    --card-2: #241D3B;
    --line: #322A48;
    --ink: #F4EFE4;
    --ink-dim: #B8AFCB;
    --ink-faint: #8A80A3;
    --gold: #C9A24B;
    --gold-soft: rgba(201,162,75,0.16);
    --danger: #E0607A;
    --radius: 18px;
    --radius-sm: 12px;
    --shadow: 0 10px 30px rgba(0,0,0,0.35);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Hind Siliguri', sans-serif;
    overscroll-behavior-y: none;
  }

  body{
    display:flex;
    justify-content:center;
    background:
      radial-gradient(1200px 500px at 50% -10%, rgba(201,162,75,0.10), transparent 60%),
      var(--bg);
    min-height:100vh;
  }

  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background: var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
    box-shadow: var(--shadow);
  }

  /* ---------- Header ---------- */
  .app-header{
    position:sticky; top:0; z-index:30;
    background: linear-gradient(180deg, var(--bg) 70%, rgba(20,17,31,0.0));
    padding: 18px 18px 10px;
  }

  .brand-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }

  .brand{
    display:flex; align-items:center; gap:10px;
  }

  .brand-mark{
    width:38px; height:38px; border-radius:11px;
    background: linear-gradient(145deg, var(--gold), #8a6b24);
    display:flex; align-items:center; justify-content:center;
    font-family:'Tiro Bangla', serif;
    font-size:20px; color:#1a1408; font-weight:700;
    box-shadow: 0 4px 14px rgba(201,162,75,0.35);
    flex-shrink:0;
  }

  .brand-text h1{
    margin:0; font-size:17px; font-weight:700; letter-spacing:0.2px; color:var(--ink);
    font-family:'Hind Siliguri', sans-serif;
  }
  .brand-text p{
    margin:1px 0 0; font-size:11.5px; color:var(--ink-faint);
  }

  .icon-btn{
    width:38px; height:38px; border-radius:50%;
    background: var(--card);
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    color: var(--ink-dim);
    cursor:pointer;
    transition: background .15s, color .15s, transform .1s;
    flex-shrink:0;
  }
  .icon-btn:active{ transform: scale(0.92); }
  .icon-btn.active{ background: var(--gold-soft); color: var(--gold); border-color: rgba(201,162,75,0.4); }

  .counter-pill{
    margin-top:12px;
    font-size:11.5px; color: var(--ink-faint);
    display:flex; align-items:center; justify-content:space-between;
  }
  .counter-pill b{ color: var(--gold); font-weight:600; }

  /* Search */
  .search-wrap{
    max-height:0; overflow:hidden;
    transition: max-height .25s ease, margin .25s ease;
    margin-top:0;
  }
  .search-wrap.open{ max-height:60px; margin-top:12px; }
  .search-box{
    display:flex; align-items:center; gap:8px;
    background: var(--card);
    border:1px solid var(--line);
    border-radius: 999px;
    padding: 9px 14px;
  }
  .search-box svg{ flex-shrink:0; color:var(--ink-faint); }
  .search-box input{
    flex:1; background:none; border:none; outline:none;
    color: var(--ink); font-family:'Hind Siliguri', sans-serif; font-size:14px;
  }
  .search-box input::placeholder{ color: var(--ink-faint); }
  .search-clear{
    color:var(--ink-faint); cursor:pointer; font-size:13px; display:none;
  }

  /* ---------- Category chips ---------- */
  .chip-row{
    display:flex; gap:8px; overflow-x:auto; padding: 14px 18px 4px;
    scrollbar-width:none;
  }
  .chip-row::-webkit-scrollbar{ display:none; }

  .chip{
    flex-shrink:0;
    padding: 8px 15px;
    border-radius: 999px;
    background: var(--card);
    border:1px solid var(--line);
    color: var(--ink-dim);
    font-size: 13.5px;
    font-weight:600;
    white-space:nowrap;
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
    transition: all .15s;
  }
  .chip .dot{ width:7px; height:7px; border-radius:50%; background: var(--ink-faint); }
  .chip.active{
    background: var(--chip-color, var(--gold));
    color:#1a1408;
    border-color: transparent;
  }
  .chip.active .dot{ background:#1a1408; opacity:.55; }

  /* Subcategory row */
  .subchip-row{
    display:flex; gap:8px; overflow-x:auto; padding: 2px 18px 12px;
    scrollbar-width:none;
  }
  .subchip-row::-webkit-scrollbar{ display:none; }
  .subchip-row.hidden{ display:none; }
  .subchip{
    flex-shrink:0;
    padding:6px 13px;
    border-radius:999px;
    background:transparent;
    border:1px dashed var(--line);
    color:var(--ink-faint);
    font-size:12px; font-weight:500;
    cursor:pointer;
    white-space:nowrap;
  }
  .subchip.active{
    border-style:solid;
    border-color: var(--gold);
    color: var(--gold);
    background: var(--gold-soft);
  }

  /* ---------- Feed ---------- */
  .feed{
    flex:1;
    padding: 6px 18px 110px;
    display:flex; flex-direction:column; gap:14px;
  }

  .quote-card{
    position:relative;
    background: var(--card);
    border:1px solid var(--line);
    border-left: 4px solid var(--accent, var(--gold));
    border-radius: var(--radius);
    padding: 20px 18px 14px;
    animation: rise .35s ease both;
  }
  @keyframes rise{ from{ opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .quote-mark{
    position:absolute; top:8px; right:16px;
    font-family:'Tiro Bangla', serif;
    font-size:40px; color: var(--accent, var(--gold)); opacity:0.18;
    line-height:1; pointer-events:none;
    user-select:none;
  }

  .quote-tag{
    display:inline-flex; align-items:center; gap:5px;
    font-size:10.5px; font-weight:600;
    color: var(--accent, var(--gold));
    background: color-mix(in srgb, var(--accent, var(--gold)) 16%, transparent);
    padding: 3px 9px; border-radius:999px;
    margin-bottom:10px;
  }

  .quote-text{
    font-family:'Tiro Bangla', serif;
    font-size: 17px;
    line-height: 1.85;
    color: var(--ink);
    margin: 0 0 12px;
    word-break: break-word;
  }

  .quote-author{
    font-size:12.5px;
    color: var(--ink-faint);
    margin: 0 0 14px;
    font-weight:600;
  }
  .quote-author::before{ content:"— "; }

  .quote-actions{
    display:flex; align-items:center; gap:8px;
    border-top:1px solid var(--line);
    padding-top:10px;
  }

  .action-btn{
    display:flex; align-items:center; gap:6px;
    background: var(--card-2);
    border:1px solid var(--line);
    color: var(--ink-dim);
    font-family:'Hind Siliguri', sans-serif;
    font-size:12.5px; font-weight:600;
    padding: 8px 13px;
    border-radius: 10px;
    cursor:pointer;
    transition: transform .1s, background .15s, color .15s;
  }
  .action-btn:active{ transform: scale(0.95); }
  .action-btn.copied{ background: rgba(120,190,140,0.16); color:#8fd6a3; border-color: rgba(120,190,140,0.35); }
  .action-btn.fav{ margin-left:auto; background:transparent; border:none; padding:8px; }
  .action-btn.fav svg{ color: var(--ink-faint); }
  .action-btn.fav.active svg{ color: var(--danger); }

  .empty-state{
    text-align:center; padding: 60px 20px; color: var(--ink-faint);
  }
  .empty-state .big{ font-size:15px; color:var(--ink-dim); margin-bottom:6px; font-weight:600; }

  .load-more{
    display:block; margin: 4px auto 0;
    background:none; border:1px solid var(--line); color:var(--gold);
    font-family:'Hind Siliguri', sans-serif; font-weight:600; font-size:13px;
    padding: 11px 22px; border-radius:999px; cursor:pointer;
  }

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    position:fixed;
    bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px;
    display:flex; justify-content:space-around; align-items:center;
    background: rgba(25,21,39,0.92);
    backdrop-filter: blur(14px);
    border-top:1px solid var(--line);
    padding: 10px 8px calc(10px + var(--safe-bottom));
    z-index:40;
  }
  .nav-btn{
    background:none; border:none; color: var(--ink-faint);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-family:'Hind Siliguri', sans-serif; font-size:10.5px; font-weight:600;
    cursor:pointer; padding:4px 14px; border-radius:12px;
    transition: color .15s;
  }
  .nav-btn.active{ color: var(--gold); }
  .nav-btn svg{ width:21px; height:21px; }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; bottom:86px; left:50%;
    transform: translateX(-50%) translateY(20px);
    background:#2c2440; color: var(--ink);
    border:1px solid var(--line);
    padding: 11px 20px; border-radius: 999px;
    font-size:13px; font-weight:600;
    box-shadow: var(--shadow);
    opacity:0; pointer-events:none;
    transition: opacity .25s, transform .25s;
    z-index:100;
    max-width:90%;
    display:flex; align-items:center; gap:8px;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1; transform: translateX(-50%) translateY(0);
  }
  .toast svg{ color:#8fd6a3; flex-shrink:0; }

  /* scrollbar for feed on desktop */
  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background: var(--line); border-radius:3px; }

  @media (min-width:481px){
    body{ padding: 24px 0; }
    .app{ min-height: calc(100vh - 48px); border-radius:28px; overflow:hidden; }
    .bottom-nav{ border-radius: 0 0 28px 28px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="app-header">
    <div class="brand-row">
      <div class="brand">
        <div class="brand-mark">উ</div>
        <div class="brand-text">
          <h1>উক্তি সংগ্রহ</h1>
          <p>বাংলা উক্তি ও ক্যাপশন সংগ্রহ</p>
        </div>
      </div>
      <button class="icon-btn" id="searchToggle" aria-label="খুঁজুন">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>

    <div class="search-wrap" id="searchWrap">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="উক্তি বা লেখকের নাম লিখুন...">
        <span class="search-clear" id="searchClear">✕</span>
      </div>
    </div>

    <div class="counter-pill" id="counterPill">
      <span><b id="visibleCount">0</b> টি উক্তি দেখাচ্ছে</span>
      <span id="totalLabel"></span>
    </div>

    <div class="chip-row" id="chipRow"></div>
    <div class="subchip-row hidden" id="subchipRow"></div>
  </header>

  <main class="feed" id="feed"></main>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="navHome">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      হোম
    </button>
    <button class="nav-btn" id="navRandom">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="8" cy="8" r="1.2" fill="currentColor" stroke="none"/><circle cx="16" cy="16" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="16" cy="8" r="1.2" fill="currentColor" stroke="none"/><circle cx="8" cy="16" r="1.2" fill="currentColor" stroke="none"/></svg>
      র‍্যান্ডম
    </button>
    <button class="nav-btn" id="navFav">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>
      পছন্দ
    </button>
  </nav>

  <div class="toast" id="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toastText">কপি হয়েছে</span>
  </div>

</div>
<script>

ory":""},{"text":"আমার দেখা কোন মানুষই আমার বাবার সমতুল্য ছিল না, এবং আমি অন্য কোন মানুষকে এতটা ভালোবাসিনি।","author":"হেডি লামার","category":"বাবা","id":345,"subcategory":""},{"text":"আমার বাবা অস্বাভাবিক কিছু করেননি। বাবাদের যা করার কথা ছিল সে শুধু তাই করেছে – সেখানে থাকতে হবে।","author":"ম্যাক্স লুকাডো","category":"বাবা","id":346,"subcategory":""},{"text":"কেউ একবার বলেছিল যে প্রতিটি মানুষ তার বাবার প্রত্যাশা পূরণ করার চেষ্টা করে বা তাদের বাবার ভুলগুলি পূরণ করার চেষ্টা করে।","author":"বারাক ওবামা","category":"বাবা","id":347,"subcategory":""},{"text":"সেরা বাবাদের নরম, মিষ্টি হৃদয় থাকে। অন্য কথায়, মহান বাবারা প্রকৃত মার্শমেলো।","author":"অজানা","category":"বাবা","id":348,"subcategory":""},{"text":"একজন বাবা আপনাকে বলেন না যে তিনি আপনাকে ভালবাসেন।","author":"দিমিত্রি দ্য স্টোনহার্ট","category":"বাবা","id":349,"subcategory":""},{"text":"আমার বাবা আমাকে বলেননি কিভাবে বাঁচতে হয়;কারণ তিনি বেঁচে ছিলেন।","author":"ক্লারেন্স বুডিংটন কেল্যান্ড","category":"বাবা","id":350,"subcategory":""},{"text":"শিক্ষিত বাবারাই শেষ বয়সে সবচেয়ে বেশি বৃদ্ধাশ্রমবাসী হয়।","author":"অজানা","category":"বাবা","id":351,"subcategory":""},{"text":"এই পৃথিবীতে কেউ একজন মেয়েকে তার বাবার চেয়ে বেশি ভালোবাসতে পারে না।","author":"মাইকেল রত্নদীপক","category":"বাবা","id":352,"subcategory":""},{"text":"একজন জ্ঞানী পিতা যে তার নিজের সন্তানকে জানে।","author":"উইলিয়াম শেক্সপিয়ার","category":"বাবা","id":353,"subcategory":""},{"text":"বাবা কখনও নিজের জন্য চিন্তা করেন না, তার চিন্তা শুধু সন্তানদের নিয়ে।","author":"","category":"বাবা","id":354,"subcategory":""},{"text":"আপনার নিজের একটি ছেলে না হওয়া পর্যন্ত আপনি কখনই জানতে পারবেন না যে আনন্দ, অনুভূতির বাইরের ভালোবাসা যা একজন পিতার হৃদয়ে অনুরণিত হয় যখন তিনি তার ছেলেকে দেখেন।","author":"","category":"বাবা","id":355,"subcategory":""},{"text":"বাবা হলেন সেই ব্যক্তি যিনি নিজে খালি পায়ে হেঁটে সন্তানদের পায়ের জুতার ব্যবস্থা করেন।","author":"","category":"বাবা","id":356,"subcategory":""},{"text":"বাবার চেয়ে কেউ আপন হয় না।","author":"","category":"বাবা", :""},{"text":"ধর্ম মানুষের প্রয়ােজনেই সৃষ্ট, তাই ধর্ম মানুষের মঙ্গলের কথাই বলে।","author":"স্টেপ হেন","category":"ধর্ম","id":449,"subcategory":""},{"text":"যারা ধর্মের বৈজ্ঞানিক ব্যাখ্যা দেয়, তারা ধার্মিকও নয়, বিজ্ঞানীও নয়। শুরুতেই স্বর্গ থেকে যাকে বিতারিত করা হয়েছিলো, তারা তার বংশধর।","author":"হুমায়ূন আজাদ","category":"ধর্ম","id":450,"subcategory":""},{"text":"ভয়ের তাড়া খেলেই ধর্মের মূঢ়তার পিছনে মানুষ লুকাতে চেষ্টা করে।","author":"রবীন্দ্রনাথ ঠাকুর","category":"ধর্ম","id":451,"subcategory":""},{"text":"ভক্ত শব্দের অর্থ খাদ্য। প্রতিটি ভক্ত তার গুরুর খাদ্য। তাই ভক্তরা দিনদিন জীর্ণ থেকে জীর্ণতর হয়ে আবর্জনায় পরিণত হয়।","author":"হুমায়ূন আজাদ","category":"ধর্ম","id":452,"subcategory":""},{"text":"ধর্ম হচ্ছে জীবন, দর্শন হচ্ছে চিন্তন। ধর্ম নেত্রপাত করে উদ্ধে, সােহার্দ্য নেত্রপাত করে অন্তরে। চিন্তন ও জীবন উভয়ই আমাদের প্রয়ােজন এবং আমাদের প্রয়ােজন উভয়ের মধ্যে সুসমতা।","author":"জেমস ফ্রিমান ক্লার্ক","category":"ধর্ম","id":453,"subcategory":""},{"text":"ধর্ম যেখানে রাজনীতির হাতিয়ার হয়ে দাঁড়ায় শান্তি সেখান থেকে দৌড়ে পালায়।","author":"রেদোয়ান মাসুদ","category":"ধর্ম","id":454,"subcategory":""},{"text":"মূর্তি ভাঙতে লাগে মেরুদন্ড, মূর্তিপূজা করতে লাগে মেরুদন্ডহীনতা।","author":"হুমায়ূন আজাদ","category":"ধর্ম","id":455,"subcategory":""},{"text":"আমি দেখতে পাই যে, বিশ্বের সর্বত্র বিচক্ষণ ও বিবেক বুদ্ধিসম্পন্ন মানুষের ধর্ম ছিল একটাই, সত্যনিষ্ঠ জীবনযাপন এবং মােকাবিলা করার ধর্ম।","author":"রালফ ওয়ালডাে ইমারসন","category":"ধর্ম","id":456,"subcategory":""},{"text":"কারো প্রতি শ্রদ্ধা অটুট রাখার উপায় হচ্ছে তার সাথে কখনো সাক্ষাৎ না করা।","author":"হুমায়ূন আজাদ","category":"ধর্ম","id":457,"subcategory":""},{"text":"ধর্মের মূল কথাই হয়ে মানুষ হিসাবে মানুষের সেবা করা।","author":"টমাস ফুলার","category":"ধর্ম","id":458,"subcategory":""},{"text":"যে মানুষটিকে তুমি দেখছো তাকেই যদি ভালো না বাসতে পারো, তবে তুমি কিভাবে ঈশ্বরকে ভালোবাসবে যাকে তুমি কোনদিন দেখোই নি?","author":"হুমায়ূন আহমেদ","category":"ধর্ম","id":459,"subcategory":""},{"text":"আসবার কালে কী জাত ছিলে, এসে <script>
(function(){
  "use strict";

  var state = {
    category: "সব",
    subcategory: "",
    query: "",
    view: "home", // home | fav
    page: 1,
    pageSize: 18
  };

  var favorites = new Set();

  var catColorMap = {};
  CATEGORIES.forEach(function(c){ catColorMap[c.key] = c.color; });

  var chipRow = document.getElementById('chipRow');
  var subchipRow = document.getElementById('subchipRow');
  var feed = document.getElementById('feed');
  var visibleCountEl = document.getElementById('visibleCount');
  var totalLabelEl = document.getElementById('totalLabel');
  var toast = document.getElementById('toast');
  var toastText = document.getElementById('toastText');
  var searchToggle = document.getElementById('searchToggle');
  var searchWrap = document.getElementById('searchWrap');
  var searchInput = document.getElementById('searchInput');
  var searchClear = document.getElementById('searchClear');

  var navHome = document.getElementById('navHome');
  var navRandom = document.getElementById('navRandom');
  var navFav = document.getElementById('navFav');

  // -------- Build category chips --------
  function buildChips(){
    var allChip = makeChip("সব", "সব", "#C9A24B");
    chipRow.appendChild(allChip);
    CATEGORIES.forEach(function(c){
      chipRow.appendChild(makeChip(c.key, c.label, c.color));
    });
  }

  function makeChip(key, label, color){
    var el = document.createElement('div');
    el.className = 'chip' + (state.category === key ? ' active' : '');
    el.style.setProperty('--chip-color', color);
    el.innerHTML = '<span class="dot"></span>' + label;
    el.addEventListener('click', function(){
      state.category = key;
      state.subcategory = "";
      state.page = 1;
      refreshChips();
      buildSubchips();
      render();
    });
    el.dataset.key = key;
    return el;
  }

  function refreshChips(){
    Array.prototype.forEach.call(chipRow.children, function(el){
      el.classList.toggle('active', el.dataset.key === state.category);
    });
  }

  function buildSubchips(){
    subchipRow.innerHTML = '';
    if(state.category !== 'ছোট ক্যাপশন'){
      subchipRow.classList.add('hidden');
      return;
    }
    var subs = Array.from(new Set(QUOTES.filter(function(q){return q.category==='ছোট ক্যাপশন';}).map(function(q){return q.subcategory;})));
    subchipRow.classList.remove('hidden');
    subs.forEach(function(s){
      var el = document.createElement('div');
      el.className = 'subchip' + (state.subcategory === s ? ' active' : '');
      el.textContent = s;
      el.addEventListener('click', function(){
        state.subcategory = (state.subcategory === s) ? "" : s;
        state.page = 1;
        buildSubchips();
        render();
      });
      subchipRow.appendChild(el);
    });
  }

  // -------- Filtering --------
  function getFiltered(){
    var q = state.query.trim().toLowerCase();
    return QUOTES.filter(function(item){
      if(state.view === 'fav' && !favorites.has(item.id)) return false;
      if(state.view !== 'fav' && state.category !== 'সব' && item.category !== state.category) return false;
      if(state.subcategory && item.subcategory !== state.subcategory) return false;
      if(q){
        var hay = (item.text + ' ' + item.author).toLowerCase();
        if(hay.indexOf(q) === -1) return false;
      }
      return true;
    });
  }

  // -------- Render --------
  function render(){
    var all = getFiltered();
    var slice = all.slice(0, state.page * state.pageSize);
    feed.innerHTML = '';

    visibleCountEl.textContent = all.length;
    totalLabelEl.textContent = state.view === 'fav' ? 'পছন্দের তালিকা' : ('মোট ' + QUOTES.length + ' টি থেকে');

    if(all.length === 0){
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<div class="big">' + (state.view==='fav' ? 'এখনো কোনো উক্তি পছন্দ করা হয়নি' : 'কোনো উক্তি পাওয়া যায়নি') + '</div><div>অন্য ক্যাটাগরি বা শব্দ দিয়ে খুঁজে দেখুন</div>';
      feed.appendChild(empty);
      return;
    }

    slice.forEach(function(item){
      feed.appendChild(renderCard(item));
    });

    if(all.length > slice.length){
      var btn = document.createElement('button');
      btn.className = 'load-more';
      btn.textContent = 'আরও দেখুন (' + (all.length - slice.length) + ' টি বাকি)';
      btn.addEventListener('click', function(){
        state.page++;
        render();
      });
      feed.appendChild(btn);
    }
  }

  function renderCard(item){
    var card = document.createElement('div');
    card.className = 'quote-card';
    var color = catColorMap[item.category] || '#C9A24B';
    card.style.setProperty('--accent', color);

    var tagLabel = item.category === 'ছোট ক্যাপশন' && item.subcategory ? item.subcategory : item.category;

    var authorHtml = item.author ? '<p class="quote-author">' + escapeHtml(item.author) + '</p>' : '';

    card.innerHTML =
      '<span class="quote-mark">"</span>' +
      '<span class="quote-tag">' + escapeHtml(tagLabel) + '</span>' +
      '<p class="quote-text">' + escapeHtml(item.text) + '</p>' +
      authorHtml +
      '<div class="quote-actions">' +
        '<button class="action-btn copy-btn" data-id="' + item.id + '">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
          '<span>কপি</span>' +
        '</button>' +
        '<button class="action-btn share-btn" data-id="' + item.id + '">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>' +
          '<span>শেয়ার</span>' +
        '</button>' +
        '<button class="action-btn fav' + (favorites.has(item.id) ? ' active' : '') + '" data-id="' + item.id + '" aria-label="পছন্দ">' +
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="' + (favorites.has(item.id) ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>' +
        '</button>' +
      '</div>';

    return card;
  }

  function escapeHtml(str){
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

  function formatQuote(item){
    return item.text + (item.author ? '\n— ' + item.author : '');
  }

  // -------- Event delegation on feed --------
  feed.addEventListener('click', function(e){
    var copyBtn = e.target.closest('.copy-btn');
    var shareBtn = e.target.closest('.share-btn');
    var favBtn = e.target.closest('.fav');

    if(copyBtn){
      var id = parseInt(copyBtn.dataset.id, 10);
      var item = QUOTES[id];
      copyToClipboard(formatQuote(item));
      flashCopied(copyBtn);
      showToast('উক্তিটি কপি হয়েছে');
      return;
    }

    if(shareBtn){
      var id2 = parseInt(shareBtn.dataset.id, 10);
      var item2 = QUOTES[id2];
      shareQuote(item2);
      return;
    }

    if(favBtn){
      var id3 = parseInt(favBtn.dataset.id, 10);
      if(favorites.has(id3)){
        favorites.delete(id3);
        favBtn.classList.remove('active');
        favBtn.querySelector('svg').setAttribute('fill','none');
      } else {
        favorites.add(id3);
        favBtn.classList.add('active');
        favBtn.querySelector('svg').setAttribute('fill','currentColor');
      }
      if(state.view === 'fav') render();
      return;
    }
  });

  function flashCopied(btn){
    var span = btn.querySelector('span');
    var original = span.textContent;
    btn.classList.add('copied');
    span.textContent = 'কপি হয়েছে!';
    setTimeout(function(){
      btn.classList.remove('copied');
      span.textContent = original;
    }, 1400);
  }

  function copyToClipboard(text){
    if(navigator.clipboard && window.isSecureContext){
      navigator.clipboard.writeText(text).catch(function(){ fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
  }

  function shareQuote(item){
    var text = formatQuote(item);
    if(navigator.share){
      navigator.share({ text: text, title: 'উক্তি সংগ্রহ' }).catch(function(){});
    } else {
      copyToClipboard(text);
      showToast('শেয়ার সমর্থন নেই, তাই কপি করা হয়েছে');
    }
  }

  var toastTimer = null;
  function showToast(msg){
    toastText.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toast.classList.remove('show'); }, 1900);
  }

  // -------- Search --------
  searchToggle.addEventListener('click', function(){
    var open = searchWrap.classList.toggle('open');
    searchToggle.classList.toggle('active', open);
    if(open){ setTimeout(function(){ searchInput.focus(); }, 200); }
    else { searchInput.value=''; state.query=''; state.page=1; render(); }
  });

  var searchDebounce = null;
  searchInput.addEventListener('input', function(){
    searchClear.style.display = searchInput.value ? 'block' : 'none';
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(function(){
      state.query = searchInput.value;
      state.page = 1;
      render();
    }, 180);
  });
  searchClear.addEventListener('click', function(){
    searchInput.value = '';
    searchClear.style.display = 'none';
    state.query = '';
    state.page = 1;
    render();
  });

  // -------- Bottom nav --------
  function setNavActive(btn){
    [navHome, navRandom, navFav].forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  }

  navHome.addEventListener('click', function(){
    state.view = 'home';
    state.page = 1;
    setNavActive(navHome);
    render();
    window.scrollTo({top:0, behavior:'smooth'});
  });

  navFav.addEventListener('click', function(){
    state.view = 'fav';
    state.page = 1;
    setNavActive(navFav);
    render();
    window.scrollTo({top:0, behavior:'smooth'});
  });

  navRandom.addEventListener('click', function(){
    var pool = (state.category === 'সব') ? QUOTES : QUOTES.filter(function(q){return q.category===state.category;});
    if(pool.length === 0) pool = QUOTES;
    var item = pool[Math.floor(Math.random()*pool.length)];
    state.view = 'home';
    setNavActive(navHome);
    // Jump: show single random card at top by filtering query to its id via temp override
    feed.innerHTML = '';
    var label = document.createElement('div');
    label.style.cssText = 'text-align:center;color:var(--ink-faint);font-size:12px;margin:6px 0 2px;';
    label.textContent = '✨ আজকের এলোমেলো উক্তি';
    feed.appendChild(label);
    feed.appendChild(renderCard(item));
    visibleCountEl.textContent = 1;
    totalLabelEl.textContent = 'র‍্যান্ডম';
    window.scrollTo({top:0, behavior:'smooth'});
  });

  // -------- Init --------
  buildChips();
  buildSubchips();
  render();

})();
</script>
</body>
</html>
